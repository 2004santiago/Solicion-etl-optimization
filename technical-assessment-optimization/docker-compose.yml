services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_test
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "PruebaT3cnica!"
      MSSQL_MEMORY_LIMIT_MB: 4096
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - ./01-schema/ddl.sql:/schema/ddl.sql:ro
      - ./02-populate:/populate:ro
      - ./03-fixtures/create-baseline-indexes.sql:/fixtures/create-baseline-indexes.sql:ro
      - mssql-data:/var/opt/mssql/data
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "PruebaT3cnica!" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mssql-data:
    driver: local
