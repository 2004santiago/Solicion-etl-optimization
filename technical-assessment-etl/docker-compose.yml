services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: etl_sqlserver
    hostname: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-P@ssw0rd2025!}"
      SA_PASSWORD: "${SA_PASSWORD:-P@ssw0rd2025!}"
      MSSQL_PID: "Developer"
      MSSQL_DB_NAME: "${MSSQL_DB_NAME:-ETL_DATA}"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./scripts/init-db.sh:/usr/local/bin/init-db.sh:ro
      - ./sql/target_schema.sql:/schemas/target_schema.sql:ro
    command: /bin/bash /usr/local/bin/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  airflow-postgres:
    image: postgres:16
    container_name: etl_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    build:
      context: ./solution/airflow
      dockerfile: Dockerfile
    image: etl-airflow:latest
    container_name: etl_airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}"
      AIRFLOW__API_AUTH__JWT_ISSUER: airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "${_AIRFLOW_WWW_USER_USERNAME:-airflow}"
      _AIRFLOW_WWW_USER_PASSWORD: "${_AIRFLOW_WWW_USER_PASSWORD:-airflow}"
    user: "0:0"
    command: version

  airflow-apiserver:
    image: etl-airflow:latest
    container_name: etl_airflow_apiserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}"
      AIRFLOW__API_AUTH__JWT_ISSUER: airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      SQLSERVER_HOST: sqlserver
      SQLSERVER_PORT: "1433"
      SQLSERVER_DB: "${MSSQL_DB_NAME:-ETL_DATA}"
      SQLSERVER_USER: sa
      SQLSERVER_PASSWORD: "${SA_PASSWORD:-P@ssw0rd2025!}"
      ETL_DATA_DIR: /opt/airflow/dags/data
      ETL_OUTPUT_DIR: /opt/airflow/output
    volumes: &airflow-common-volumes
      - ./solution/airflow/dags:/opt/airflow/dags
      - ./solution/airflow/logs:/opt/airflow/logs
      - ./solution/airflow/plugins:/opt/airflow/plugins
      - ./solution/airflow/output:/opt/airflow/output
    command: api-server
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    image: etl-airflow:latest
    container_name: etl_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  airflow-dag-processor:
    image: etl-airflow:latest
    container_name: etl_airflow_dag_processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-common-env
    volumes: *airflow-common-volumes
    command: dag-processor
    restart: unless-stopped

volumes:
  sqlserver_data:
  airflow_postgres_data:
